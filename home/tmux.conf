# ~/.tmux.conf
# Agentic workflow: tmux owns all sessions, windows (tabs), and panes.
##################################################################
# Core behavior
##################################################################
# Prefix: Ctrl+a (easier to reach than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix
# True color + proper terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# Start windows/panes at 1, renumber when one closes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
# Big scrollback for long agent output
set -g history-limit 50000
# Instant escape (important for Neovim)
set -sg escape-time 0
# Mouse support (click panes, scroll agent output)
set -g mouse on
# Vi keys in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
##################################################################
# Splits & navigation
##################################################################
# Intuitive splits, keep current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# Move between panes with prefix + hjkl (vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Resize panes with prefix + HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# New window (tab) keeps current directory
bind c new-window -c "#{pane_current_path}"
# Quick window hopping: prefix + n/p, or Alt+number (no prefix!)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
# Reload config: prefix + r
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"
##################################################################
# The agentic layout: prefix + A
# Creates the Kun Chen layout: agent (claude) left, nvim right
##################################################################
bind A split-window -h -c "#{pane_current_path}" \; \
       select-pane -L \; \
       send-keys 'claude' C-m \; \
       select-pane -R \; \
       send-keys 'nvim .' C-m \; \
       select-pane -L
##################################################################
# Status bar: tabs along the top, Tokyo Night colors
##################################################################
set -g status-position top
set -g status-justify left
set -g status-style "bg=
#0f0f17,fg=
#565f89"
set -g status-left "#[bg=
#7aa2f7,fg=
#0f0f17,bold]  #S #[bg=
#0f0f17] "
set -g status-left-length 30
set -g status-right "#[fg=
#565f89] %a %b %d  %H:%M "
# Window (tab) styling
setw -g window-status-format "#[fg=
#565f89] #I:#W "
setw -g window-status-current-format "#[bg=
#24283b,fg=
#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""
# Pane borders
set -g pane-border-style "fg=
#24283b"
set -g pane-active-border-style "fg=
#7aa2f7"
# Messages
set -g message-style "bg=
#7aa2f7,fg=
#0f0f17,bold"
